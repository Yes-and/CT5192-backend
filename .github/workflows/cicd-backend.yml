name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/lms-backend

jobs:
  ci-cd:
    name: Build, Scan & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Required for SonarQube blame data

      # ── Python & Tests ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up test structure
        run: |
          mkdir -p tests
          touch tests/__init__.py
          if [ -f test_app.py ]; then
            mv test_app.py tests/
          fi

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      # ── SonarQube ────────────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            "-Dsonar.projectName=LMS Backend"
            -Dsonar.sources=.
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/tests/**,**/coverage/**
            -Dsonar.test.inclusions=**/test_*.py
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.10
            -Dsonar.sourceEncoding=UTF-8

      # ── SNYK ─────────────────────────────────────────────────────────────────
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python-3.10@master
        continue-on-error: true  # Prevents pipeline failing on found vulns; remove to enforce
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # ── Docker Build ─────────────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (local tag for Trivy)
        run: docker build -t ${{ env.DOCKER_IMAGE }}:local .

      # ── Trivy ────────────────────────────────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ── Push Image ───────────────────────────────────────────────────────────
      - name: Build and push multi-platform image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:latest
          cache-to: type=inline

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Set up SSH
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} '
            echo "Pulling latest backend image..."
            docker-compose pull backend
            echo "Restarting backend container..."
            docker-compose up -d --no-deps --force-recreate backend
            echo "Cleaning up unused images..."
            docker image prune -f
            echo "Backend deployment complete!"
          '

      # ── ZAP ──────────────────────────────────────────────────────────────────
      - name: Run ZAP baseline scan
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://${{ secrets.SERVER_IP }}:4000'
          cmd_options: '-I'

      - name: Upload ZAP report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: zap-backend-report
          path: report_html.html
